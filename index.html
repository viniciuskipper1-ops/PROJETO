<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grafismo Fonético - Kit de Atividades</title>
    <!-- Speed up resource handshakes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://i.imgur.com" crossorigin />
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://static.doubleclick.net" />
    
    <!-- Primary stylesheet requested by user -->
    <link rel="stylesheet" href="/assets/index-Dr8ko6LT.css">

    <!-- LCP Video Poster Preload (Directly in HTML head, prioritized) -->
    <link rel="preload" as="image" href="https://i.imgur.com/wMxUIHt.png" fetchpriority="high" referrerpolicy="no-referrer">

    <!-- LCP Preloads - Preload critical hero image at High Priority -->
    <link rel="preload" as="image" href="https://i.imgur.com/Fimfi0M.png" type="image/png" fetchpriority="high" referrerpolicy="no-referrer" />

    <!-- LCP Video Preload - Preload video to prevent network cascading delays -->
    <link rel="preload" href="https://i.imgur.com/wMxUIHt.mp4" as="video" type="video/mp4" fetchpriority="high" referrerpolicy="no-referrer" />

    <!-- Font preloading to eliminate chaining bottlenecks -->
    <link rel="preload" href="https://fonts.gstatic.com/s/quicksand/v31/6xKtdSFSAt0Fr156lk_arLk5Y_k.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="https://fonts.gstatic.com/s/fredoka/v13/X7nP4b81Anoc_R61M90qY8S7Dg.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Google Fonts asynchronously loaded (non-blocking for instant first paint) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700;900&family=Quicksand:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700;900&family=Quicksand:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700;900&family=Quicksand:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
    </noscript>

    <style>
      /* Ultra high-speed critical styles for instant FCP & Zero Cumulative Layout Shift (CLS) */
      :root {
        --bg-warm: #FCFAF5;
        --color-orange: #d97706;
        --color-dark: #1e293b;
        --font-display: 'Fredoka', 'Quicksand', system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-warm);
        font-family: 'Quicksand', system-ui, -apple-system, sans-serif;
        color: #334155;
      }
      .font-display {
        font-family: var(--font-display);
      }
      .announcement-bar {
        width: 100%;
        background-color: #d97706;
        color: #291305;
        padding: 10px 16px;
        text-align: center;
        font-size: 14px;
        font-weight: 950;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        box-sizing: border-box;
      }
      .announcement-bar .strike {
        text-decoration: line-through;
        opacity: 0.85;
      }
      .announcement-bar .badge-green {
        background-color: #ffffff;
        color: #065f46;
        padding: 2px 8px;
        border-radius: 8px;
        font-weight: 900;
        margin: 0 4px;
        box-shadow: 0 1px 2.5px rgba(0,0,0,0.06);
      }
      .announcement-bar .badge-red {
        background-color: #b91c1c;
        color: #ffffff;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      .hero-section {
        position: relative;
        padding: 24px 16px 48px 16px;
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-sizing: border-box;
      }
      .glow-left {
        position: absolute;
        top: 40px;
        left: 40px;
        width: 192px;
        height: 192px;
        background-color: rgba(251, 191, 36, 0.15);
        border-radius: 50%;
        filter: blur(40px);
        pointer-events: none;
      }
      .glow-right {
        position: absolute;
        top: 80px;
        right: 40px;
        width: 192px;
        height: 192px;
        background-color: rgba(52, 211, 153, 0.12);
        border-radius: 50%;
        filter: blur(40px);
        pointer-events: none;
      }
      .bundle-container {
        width: 100%;
        max-width: 448px;
        margin: 0 auto;
        padding-bottom: 24px;
        z-index: 10;
        display: flex;
        justify-content: center;
        box-sizing: border-box;
      }
      .bundle-card {
        background-color: rgba(254, 243, 199, 0.4);
        padding: 4px;
        border-radius: 24px;
        border: 1px solid rgba(251, 191, 36, 0.25);
        width: 100%;
        max-width: 500px;
        box-sizing: border-box;
      }
      .bundle-img {
        width: 100%;
        height: auto;
        max-height: 180px;
        object-fit: contain;
        display: block;
      }
      @media(min-width: 640px) {
        .bundle-img {
          max-height: 220px;
        }
      }
      .title-container {
        text-align: center;
        max-width: 896px;
        margin-bottom: 24px;
        z-index: 10;
        width: 100%;
      }
      .title {
        color: var(--color-dark);
        font-size: 24px;
        font-weight: 900;
        line-height: 1.3;
        margin: 0 auto 16px auto;
        max-width: 100%;
        padding: 0 8px;
        box-sizing: border-box;
      }
      @media (min-width: 640px) {
        .title {
          font-size: 30px;
        }
      }
      @media (min-width: 768px) {
        .title {
          font-size: 36px;
        }
      }
      .highlight-box {
        display: inline-block;
        position: relative;
        padding: 4px 12px;
        background-color: #FEF9E6;
        border-left: 2px solid #f59e0b;
        border-right: 2px solid #f59e0b;
        font-weight: 700;
        border-radius: 4px;
        word-break: break-word;
      }
      .subtitle {
        color: #78350f;
        font-weight: 800;
        font-size: 18px;
        margin: 0;
      }
      @media (min-width: 640px) {
        .subtitle {
          font-size: 20px;
        }
      }
      .video-wrapper {
        width: 100%;
        max-width: 420px;
        margin: 0 auto 32px auto;
        z-index: 10;
        box-sizing: border-box;
      }
      .video-box {
        background-color: #020617;
        border-radius: 24px;
        overflow: hidden;
        border: 4px solid #0f172a;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        aspect-ratio: 9/16;
        position: relative;
        width: 100%;
        box-sizing: border-box;
      }
      .video-poster {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.9;
        display: block;
      }
      .video-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: rgba(0,0,0,0.35);
      }
      .play-btn {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background-color: #f59e0b;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.4);
        border: 2px solid white;
        cursor: pointer;
        transition: transform 0.2s ease;
      }
      .play-btn:hover {
        transform: scale(1.08);
      }
      .play-btn svg {
        width: 28px;
        height: 28px;
        fill: white;
        stroke: white;
        margin-left: 4px;
      }
      .btn-label {
        margin-top: 16px;
        background-color: rgba(2, 6, 23, 0.85);
        padding: 6px 16px;
        border-radius: 9999px;
        color: white;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.05em;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- High speed critical CSS + Semantic Content Skeleton for Instant FCP & zero CLS -->
      <div class="announcement-bar">
        <span>🔥</span>
        <span>De <span class="strike">R$ 79,90</span> por apenas <span class="badge-green">R$ 19,90</span> <span class="badge-red">SOMENTE HOJE!</span></span>
      </div>

      <header class="hero-section">
        <div class="glow-left"></div>
        <div class="glow-right"></div>

        <div class="bundle-container">
          <div class="bundle-card">
            <img 
              class="bundle-img"
              src="https://i.imgur.com/Fimfi0M.png" 
              alt="Kit Completo Grafismo Fonético" 
              width="500" 
              height="220" 
              fetchpriority="high"
              referrerpolicy="no-referrer"
            />
          </div>
        </div>

        <div class="title-container">
          <h1 class="title font-display">
            Descubra a <span class="highlight-box">técnica americana que ensina as crianças a ler</span> até <strong>10 vezes mais rápido</strong>, sem pressão!
          </h1>
          <p class="subtitle">
            Com apenas <span style="text-decoration: underline; text-decoration-style: wavy; text-decoration-color: #f59e0b;">10 minutos por dia</span>.
          </p>
        </div>

        <div class="video-wrapper" style="max-width: 324px; width: 100%; margin: 24px auto 0 auto;">
          <div class="video-box" style="background: #0f172a; border: 4px solid #f59e0b; position: relative; aspect-ratio: 9/16; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);">
            <iframe 
              width="324" 
              height="576" 
              src="https://www.youtube.com/embed/Upyib64CrAU" 
              title="Pv Grafismo Fonético V2 Kit Educação Kids" 
              frameborder="0" 
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
              referrerpolicy="strict-origin-when-cross-origin" 
              allowfullscreen
              style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border: 0;"
            ></iframe>
          </div>
        </div>


      </header>
    </div>
    <script>
      // Desregistra qualquer Service Worker existente e limpa os caches após o carregamento inicial da página para eliminar latência de processamento de documentos
      window.addEventListener('load', () => {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (const registration of registrations) {
              registration.unregister();
            }
          });
        }
        if ('caches' in window) {
          caches.keys().then((keys) => {
            keys.forEach((key) => {
              caches.delete(key);
            });
          });
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
